server:
  port: 8080 

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true 
      routes:
  
        - id: catalogo-service
          uri: lb://catalogo-service 
          predicates:
            - Path=/api/catalogo/**
